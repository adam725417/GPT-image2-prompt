<!doctype html>
<html lang="zh-Hant">
<head>

  <style>
    :root {
      --bg:#f7f4ef;
      --paper:#fffdf8;
      --ink:#14213d;
      --muted:#637083;
      --line:#e7dfd2;
      --brand:#223b73;
      --brand2:#5c6bc0;
      --accent:#ffb703;
      --chip:#eef2ff;
      --slot:#fff1bd;
      --slot-border:#e3a900;
      --shadow: 0 18px 50px rgba(20,33,61,.10);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {

      background:

    }
    .wrap { width: min(1180px, calc(100% - 40px)); margin: 0 auto; }
    header { padding: 56px 0 26px; }
    .hero {
      background: linear-gradient(135deg, rgba(255,253,248,.92), rgba(238,242,255,.92));
      border: 1px solid rgba(231,223,210,.85);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: clamp(28px, 5vw, 56px);
      position: relative;
      overflow: hidden;
    }
    .hero:after {
      content:"";
      position:absolute; inset:auto -120px -180px auto;
      width: 360px; height: 360px;
      border-radius:999px;
      background: rgba(34,59,115,.10);
      pointer-events:none;
    }
    .eyebrow {
      display:inline-flex; align-items:center; gap:8px;
      color: var(--brand);
      background: rgba(34,59,115,.08);
      border: 1px solid rgba(34,59,115,.12);
      border-radius: 999px;
      padding: 8px 13px;
      font-weight: 700;
      letter-spacing: .02em;
      font-size: 14px;
    }
    h1 { font-size: clamp(34px, 6vw, 72px); line-height: 1.02; letter-spacing: -0.04em; margin: 22px 0 18px; }
    .lead { max-width: 760px; color: var(--muted); font-size: 18px; line-height: 1.8; margin: 0; }
    .hero-actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:26px; position:relative; z-index:1; }
    .btn, button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      cursor: pointer;
      background: var(--brand);
      color:white;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size: 14px;
    }
    .btn:hover, button:hover { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(34,59,115,.16); }
    .btn.secondary, button.secondary { background: white; color: var(--brand); border: 1px solid rgba(34,59,115,.15); }
    .stats { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; margin-top: 20px; }
    .stat { background: rgba(255,255,255,.72); border: 1px solid var(--line); border-radius: 20px; padding: 18px; }
    .stat strong { display:block; font-size: 28px; color: var(--brand); }
    .stat span { color: var(--muted); font-size:14px; }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: rgba(247,244,239,.82);
      border-bottom: 1px solid rgba(231,223,210,.8);
      padding: 14px 0;
      margin-bottom: 26px;
    }
    .toolbar-grid { display:grid; grid-template-columns: 1fr auto; gap: 16px; align-items:center; }
    .searchbox {
      display:flex; align-items:center; gap: 10px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 16px;
      box-shadow: 0 8px 20px rgba(20,33,61,.04);
    }
    .searchbox input {
      width: 100%; border: 0; outline: 0; background: transparent;
      font-size: 16px; color: var(--ink);
    }
    .filters { display:flex; flex-wrap:wrap; gap: 8px; margin: 14px 0 0; }
    .filter {
      background: white;
      color: var(--brand);
      border: 1px solid rgba(34,59,115,.12);
      padding: 9px 13px;
      border-radius: 999px;
      font-size: 13px;
      white-space: nowrap;
    }
    .filter.active { background: var(--brand); color: white; }
    .countline { color: var(--muted); font-size: 14px; font-weight: 700; white-space:nowrap; }
    main { padding-bottom: 64px; }
    .section-title { display:flex; align-items:flex-end; justify-content:space-between; gap:18px; margin: 22px 0 18px; }
    .section-title h2 { font-size: 26px; margin:0; letter-spacing:-.02em; }
    .hint { color: var(--muted); margin: 6px 0 0; line-height:1.7; }
    .grid { display:grid; gap: 22px; }
    .card {
      background: rgba(255,253,248,.96);
      border: 1px solid rgba(231,223,210,.98);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-inner { display:grid; grid-template-columns: minmax(260px, 38%) 1fr; gap: 0; }
    .preview {
      background: linear-gradient(160deg, #fff, #f0f3ff);
      padding: 18px;
      min-height: 100%;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      border-right: 1px solid var(--line);
    }
    .preview img {
      width: 100%;
      max-height: 640px;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 16px 36px rgba(20,33,61,.14);
      background:white;
    }
    .content { padding: 22px; }
    .meta { display:flex; gap: 8px; flex-wrap:wrap; align-items:center; margin-bottom: 10px; }
    .no { background: var(--brand); color:white; border-radius: 999px; padding: 5px 10px; font-weight:900; font-size:12px; }
    .cat { background: var(--chip); color: var(--brand); border-radius:999px; padding:5px 10px; font-weight:800; font-size:12px; }
    h3 { margin: 0; font-size: 25px; letter-spacing:-.02em; }
    .scenario { color: var(--muted); line-height: 1.7; margin: 10px 0 14px; }
    .tags { display:flex; flex-wrap:wrap; gap:7px; margin-bottom: 14px; }
    .tag { background:#f6f7fb; border: 1px solid #e5e8f6; color:#44506a; font-size:12px; font-weight:700; border-radius:999px; padding:5px 9px; }
    .effect {
      border-left: 4px solid var(--accent);
      background: #fff8e5;
      border-radius: 14px;
      padding: 10px 12px;
      line-height:1.65;
      color: #5c4a11;
      margin: 14px 0;
      font-size: 14px;
    }
    .fields { display:flex; flex-wrap:wrap; gap: 8px; margin: 8px 0 14px; }
    .field-chip {
      border:1px dashed rgba(227,169,0,.75);
      background: #fff8db;
      color:#5a4500;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
    }
    .prompt-label { display:flex; align-items:center; justify-content:space-between; gap: 12px; margin-top:14px; }
    .prompt-label strong { color: var(--brand); }
    .prompt-view {
      background: #0f1b31;
      color: #f9fbff;
      border-radius: 18px;
      padding: 16px;
      white-space: pre-wrap;
      line-height: 1.75;
      font-size: 14px;
      overflow:auto;
      max-height: 360px;
      border: 1px solid rgba(255,255,255,.08);
    }
    .slot {
      background: var(--slot);
      color: #1c1c1c;
      border: 1px solid var(--slot-border);
      border-radius: 8px;
      padding: 1px 5px;
      font-weight: 900;
    }
    details { margin-top: 14px; }
    summary {
      cursor: pointer;
      font-weight: 900;
      color: var(--brand);
      background: #f5f7ff;
      border: 1px solid #dfe5ff;
      border-radius: 16px;
      padding: 12px 14px;
      user-select:none;
    }
    .editor {
      margin-top: 12px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }
    .inputs { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; }
    label { display:block; font-size: 13px; color: var(--muted); font-weight: 800; margin-bottom:6px; }
    .input { width:100%; border:1px solid var(--line); border-radius: 12px; padding: 10px 12px; min-height: 44px; font-size: 14px; outline: none; background:#fffdf9; color:var(--ink); }
    .input:focus { border-color: var(--brand2); box-shadow: 0 0 0 4px rgba(92,107,192,.12); }
    textarea.output {
      width:100%; min-height: 180px; resize: vertical;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px;
      font-size: 14px;
      line-height: 1.7;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Noto Sans TC", monospace;
      background:#fbfaf7;
      color:var(--ink);
    }
    .editor-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top: 10px; align-items:center; }
    .copied { color:#18794e; font-size: 13px; font-weight: 900; display:none; }
    .copied.show { display:inline; }
    .empty {
      padding: 34px;
      text-align:center;
      border: 1px dashed var(--line);
      border-radius: 22px;
      color: var(--muted);
      background: rgba(255,255,255,.58);
    }
    footer { color: var(--muted); border-top: 1px solid var(--line); padding: 28px 0 46px; line-height:1.7; }
    .topbtn { position: fixed; right: 20px; bottom: 20px; z-index: 40; border-radius: 18px; padding: 12px 14px; }
    @media (max-width: 860px) {
      .wrap { width: min(100% - 28px, 1180px); }
      .toolbar-grid { grid-template-columns: 1fr; }
      .countline { white-space:normal; }
      .stats { grid-template-columns: 1fr; }
      .card-inner { grid-template-columns: 1fr; }
      .preview { border-right:0; border-bottom:1px solid var(--line); }
      .inputs { grid-template-columns: 1fr; }
      .section-title { display:block; }
    }
    @media print {
      .toolbar, .hero-actions, details, .topbtn { display:none; }
      body { background:white; }
      .card { break-inside: avoid; box-shadow:none; }
      .prompt-view { max-height:none; color:#111; background:#f7f7f7; }
    }
  </style>
</head>
<body>
  <header class="wrap">
    <section class="hero">
      <span class="eyebrow">GPT-IMAGE2 Prompt Gallery</span>
      <h1>22 種影像生成應用，快速找類型、直接改 Prompt</h1>
      <p class="lead">每張卡片左側放效果圖，右側放 Prompt；黃色標註代表可替換文字，也可以展開欄位直接改寫並複製。</p>
      <div class="hero-actions">
        <a class="btn" href="#gallery">開始找 Prompt</a>
        <button class="secondary" id="expandAll">展開所有自訂欄位</button>
        <button class="secondary" id="collapseAll">收合所有自訂欄位</button>
      </div>
      <div class="stats">
        <div class="stat"><strong>22</strong><span>種影像應用</span></div>
        <div class="stat"><strong>9</strong><span>大類型可篩選</span></div>
      </div>
    </section>
  </header>
  <section class="toolbar">
    <div class="wrap">
      <div class="toolbar-grid">
        <div class="searchbox"><span>🔎</span><input id="search" type="search" placeholder="搜尋應用類型、風格、比例、產品、角色、社群、簡報…"></div>
        <div class="countline" id="countline">顯示 22 種 Prompt</div>
      </div>
      <div class="filters" id="filters"></div>
    </div>
  </section>
  <main class="wrap" id="gallery">
    <div class="section-title">
      <div>
        <h2>Prompt 應用卡片</h2>
        <p class="hint">建議先用分類找場景，再看效果圖是否接近你要的成果，最後改黃色欄位。</p>
      </div>
    </div>
    <section class="grid" id="cards"></section>
  </main>
  <button class="topbtn" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑ 回上方</button>

        "key": "風格",
        "label": "風格",
        "default": "日系無印風說明書版"
      },
      {
        "key": "規格",
        "label": "規格",
        "default": "A4／說明書海報風"
      },
      {
        "key": "配色",
        "label": "配色",
        "default": "白色、淺灰、淡藍色"
      }
    ],
    "template": "請幫我繪製[{{產品}}]商品使用說明書，{{風格}}。\n{{規格}}，背景以 {{配色}} 為主，搭配少量深灰文字與藍色重點標示。"
  },
  {
    "id": 22,
    "title": "塗鴉風格文字",
    "category": "照片加工",
    "scenario": "適合照片再設計、餐飲社群圖、生活紀錄、趣味註記風內容。",
    "tags": [
      "照片加工",
      "塗鴉",
      "手寫字",
      "社群感"
    ],
    "image": "assets/app-22.webp",
    "effect": "在原圖上疊加手繪塗鴉與手寫文字，讓照片更有趣但不遮擋主體。",
    "fields": [
      {
        "key": "塗鴉風格",
        "label": "塗鴉風格",
        "default": "塗鴉風格"
      },
      {
        "key": "語氣",
        "label": "文字語氣",
        "default": "幽默、可愛、吐槽、療癒、日常感或社群感"
      },
      {
        "key": "品質",
        "label": "品質要求",
        "default": "高解析度、乾淨疊加、自然手繪感、色彩和諧、線條有機不僵硬、適合社群媒體發布"
      }
    ],
    "template": "請加入一層{ {{塗鴉風格}} }的手繪塗鴉，使塗鴉與圖片中的主體自然互動。\n塗鴉應該模仿、跟隨或誇張原圖中的動作、形狀、手勢、表情或視覺焦點，讓它看起來像是特意畫在照片上的創意註記，而不是後期隨便貼上的裝飾。\n請在圖片周圍加入少量文字風格的手寫文字。文字內容需根據圖片情境自動生成，語氣可以是 { {{語氣}} }，但要符合畫面情緒。請避免使用制式化短語。\n請不要遮擋主體臉部、重要物件、品牌文字或主要焦點。\n整體構圖需平衡，讓塗鴉增強圖片趣味，而不是讓畫面變得雜亂。\n畫面品質：{{品質}}。"
  }
];
    let currentCategory = '全部';
    const state = new Map();

    function escapeHtml(s) {
      return String(s).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
    }
    function valuesFor(item) {
      if (!state.has(item.id)) {
        state.set(item.id, Object.fromEntries(item.fields.map(f => [f.key, f.default])));
      }
      return state.get(item.id);
    }
    function fillPrompt(item) {
      const values = valuesFor(item);
      let out = item.template;
      item.fields.forEach(f => {
        out = out.split('{{' + f.key + '}}').join(values[f.key] || '');
      });
      return out;
    }
    function renderPromptHtml(item) {
      const values = valuesFor(item);
      const re = /\{\{([^}]+)\}\}/g;
      let last = 0;
      let html = '';
      let m;
      while ((m = re.exec(item.template)) !== null) {
        html += escapeHtml(item.template.slice(last, m.index));
        const key = m[1];
        const field = item.fields.find(f => f.key === key);
        const value = values[key] || '';
        html += `<span class="slot" title="可自行更換：${escapeHtml(field?.label || key)}">${escapeHtml(value)}</span>`;
        last = m.index + m[0].length;
      }
      html += escapeHtml(item.template.slice(last));
      return html;
    }
    function categories() {
      const map = new Map();
      templates.forEach(t => map.set(t.category, (map.get(t.category) || 0) + 1));
      return [['全部', templates.length], ...Array.from(map.entries())];
    }
    function renderFilters() {
      const el = document.getElementById('filters');
      el.innerHTML = categories().map(([cat, count]) => `<button class="filter ${cat === currentCategory ? 'active' : ''}" data-cat="${escapeHtml(cat)}">${escapeHtml(cat)} <span>${count}</span></button>`).join('');
      el.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
        currentCategory = btn.dataset.cat;
        renderFilters();
        renderCards();
      }));
    }
    function matches(item, q) {
      const hay = [item.title, item.category, item.scenario, item.effect, ...item.tags, ...item.fields.map(f => f.default)].join(' ').toLowerCase();
      return hay.includes(q.toLowerCase());
    }
    function cardHtml(item) {
      const values = valuesFor(item);
      const fields = item.fields.map(f => `<span class="field-chip">${escapeHtml(f.label)}</span>`).join('');
      const tags = item.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
      const inputs = item.fields.map(f => `
        <div>
          <label for="field-${item.id}-${escapeHtml(f.key)}">${escapeHtml(f.label)}</label>
          <textarea class="input" rows="2" id="field-${item.id}-${escapeHtml(f.key)}" data-id="${item.id}" data-key="${escapeHtml(f.key)}">${escapeHtml(values[f.key])}</textarea>
        </div>`).join('');
      return `
      <article class="card" id="app-${String(item.id).padStart(2,'0')}">
        <div class="card-inner">
          <figure class="preview"><img loading="lazy" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)} 效果參考圖"></figure>
          <div class="content">
            <div class="meta"><span class="no">#${String(item.id).padStart(2,'0')}</span><span class="cat">${escapeHtml(item.category)}</span></div>
            <h3>${escapeHtml(item.title)}</h3>
            <p class="scenario">${escapeHtml(item.scenario)}</p>
            <div class="tags">${tags}</div>
            <div class="effect"><strong>效果參考：</strong>${escapeHtml(item.effect)}</div>
            <div><strong>可替換欄位：</strong><div class="fields">${fields}</div></div>
            <div class="prompt-label"><strong>Prompt 做法</strong><button class="secondary" data-copy="${item.id}">複製 Prompt</button></div>
            <pre class="prompt-view" id="prompt-view-${item.id}">${renderPromptHtml(item)}</pre>
            <details class="edit-details">
              <summary>自訂黃色欄位，產生自己的 Prompt</summary>
              <div class="editor">
                <div class="inputs">${inputs}</div>
                <textarea class="output" id="output-${item.id}" readonly>${escapeHtml(fillPrompt(item))}</textarea>
                <div class="editor-actions"><button data-copy="${item.id}">複製改寫後 Prompt</button><button class="secondary" data-reset="${item.id}">還原預設</button><span class="copied" id="copied-${item.id}">已複製</span></div>
              </div>
            </details>
          </div>
        </div>
      </article>`;
    }
    function renderCards() {
      const q = document.getElementById('search').value.trim();
      const filtered = templates.filter(t => (currentCategory === '全部' || t.category === currentCategory) && (!q || matches(t, q)));
      const cards = document.getElementById('cards');
      document.getElementById('countline').textContent = `顯示 ${filtered.length} / ${templates.length} 種 Prompt`;
      if (!filtered.length) {
        cards.innerHTML = '<div class="empty">找不到符合條件的 Prompt，請換一個關鍵字或切回「全部」。</div>';
        return;
      }
      cards.innerHTML = filtered.map(cardHtml).join('');
      bindCardEvents();
    }
    function updateItem(id) {
      const item = templates.find(t => t.id == id);
      if (!item) return;
      const view = document.getElementById(`prompt-view-${id}`);
      const output = document.getElementById(`output-${id}`);
      if (view) view.innerHTML = renderPromptHtml(item);
      if (output) output.value = fillPrompt(item);
    }
    function bindCardEvents() {
      document.querySelectorAll('.input').forEach(input => {
        input.addEventListener('input', e => {
          const id = Number(e.target.dataset.id);
          const key = e.target.dataset.key;
          const values = valuesFor(templates.find(t => t.id === id));
          values[key] = e.target.value;
          updateItem(id);
        });
      });
      document.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = Number(btn.dataset.copy);
          const item = templates.find(t => t.id === id);
          const text = fillPrompt(item);
          try {
            await navigator.clipboard.writeText(text);
          } catch (e) {
            const area = document.getElementById(`output-${id}`);
            if (area) { area.select(); document.execCommand('copy'); }
          }
          const copied = document.getElementById(`copied-${id}`);
          if (copied) { copied.classList.add('show'); setTimeout(()=>copied.classList.remove('show'), 1400); }
        });
      });
      document.querySelectorAll('[data-reset]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = Number(btn.dataset.reset);
          const item = templates.find(t => t.id === id);
          state.set(id, Object.fromEntries(item.fields.map(f => [f.key, f.default])));
          renderCards();
          const target = document.getElementById(`app-${String(id).padStart(2,'0')}`);
          if (target) target.scrollIntoView({block:'center'});
        });
      });
    }
    document.getElementById('search').addEventListener('input', renderCards);
    document.getElementById('expandAll').addEventListener('click', () => document.querySelectorAll('details').forEach(d => d.open = true));
    document.getElementById('collapseAll').addEventListener('click', () => document.querySelectorAll('details').forEach(d => d.open = false));
    renderFilters();
    renderCards();
  </script>
</body>
</html>
